definitions:
  handlers.CompleteUploadInput:
    properties:
      files:
        items:
          properties:
            contentType:
              type: string
            filename:
              type: string
            key:
              type: string
            size:
              type: integer
          type: object
        type: array
      recipientKeys:
        items:
          $ref: '#/definitions/handlers.RecipientInput'
        type: array
      token:
        type: string
    type: object
  handlers.LoginInput:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  handlers.PresignResponse:
    properties:
      token:
        type: string
      urls:
        items:
          $ref: '#/definitions/handlers.PresignedFile'
        type: array
    type: object
  handlers.PresignedFile:
    properties:
      filename:
        type: string
      key:
        type: string
      uploadURL:
        type: string
    type: object
  handlers.RecipientInput:
    properties:
      encryptedKey:
        description: The encrypted AES key
        type: string
      publicKey:
        description: Used to find the User ID
        type: string
    type: object
  handlers.RegisterInput:
    properties:
      email:
        type: string
      encryptedPrivateKey:
        type: string
      password:
        type: string
      publicKey:
        type: string
      username:
        type: string
    type: object
  utils.Payload:
    properties:
      data: {}
      message:
        type: string
      success:
        type: boolean
    type: object
info:
  contact: {}
paths:
  /api/v1/auth/google/callback:
    get:
      description: Handles the callback from Google OAuth, exchanges the code for
        a token, retrieves user info, and either logs in or registers the user based
        on the flow type. Issues a JWT token and sets it in an HTTP-only cookie before
        redirecting the user to the appropriate frontend page.
      produces:
      - application/json
      responses:
        "302":
          description: Redirects to frontend with login/register status
        "400":
          description: Invalid OAuth state
          schema:
            $ref: '#/definitions/utils.Payload'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.Payload'
      summary: Handle Google OAuth callback
      tags:
      - Auth
  /api/v1/auth/google/login:
    get:
      description: Initiates the Google OAuth login flow by generating a state parameter
        and redirecting the user to Google's OAuth consent screen.
      parameters:
      - description: Optional redirect type (login or register)
        in: query
        name: redirect
        type: string
      produces:
      - application/json
      responses:
        "302":
          description: Redirects to Google OAuth consent screen
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.Payload'
      summary: Initiate Google OAuth login
      tags:
      - Auth
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user and issues a JWT token in an HTTP-only cookie.
        Expects JSON body with username and password. Validates credentials against
        the database, and on success, returns the user's public key and encrypted
        private key in the response.
      parameters:
      - description: Login request
        in: body
        name: loginRequest
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful, returns public and encrypted private keys
          schema:
            $ref: '#/definitions/utils.Payload'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/utils.Payload'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/utils.Payload'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.Payload'
      summary: User login
      tags:
      - Auth
  /api/v1/auth/sign-up:
    post:
      consumes:
      - application/json
      description: Registers a new user with username, email, password, public key,
        and encrypted private key. Validates input and checks for existing username/email
        before creating the account. Returns success message on successful registration.
      parameters:
      - description: Registration request
        in: body
        name: registrationRequest
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: User registered successfully
          schema:
            $ref: '#/definitions/utils.Payload'
        "400":
          description: Invalid input or user already exists
          schema:
            $ref: '#/definitions/utils.Payload'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.Payload'
      summary: User registration
      tags:
      - Auth
  /api/v1/files/complete:
    post:
      consumes:
      - application/json
      description: Verifies uploaded files on R2, stores file metadata, and registers
        the upload session in the database. Each transfer is valid for 1 hour and
        limited to 100MB for anonymous uploads.
      parameters:
      - description: Upload completion payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/handlers.CompleteUploadInput'
      produces:
      - application/json
      responses:
        "200":
          description: Files uploaded successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.Payload'
            - properties:
                data:
                  additionalProperties: true
                  type: object
              type: object
        "400":
          description: Invalid input or verification failed
          schema:
            $ref: '#/definitions/utils.Payload'
        "405":
          description: Method not allowed
          schema:
            $ref: '#/definitions/utils.Payload'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/utils.Payload'
      summary: Complete file upload
      tags:
      - Files
  /api/v1/files/presign:
    post:
      consumes:
      - application/json
      description: Accepts a list of files (name and size), validates the total size,
        and returns presigned PUT URLs for each file. Each upload session is identified
        by a unique token.
      parameters:
      - description: List of files to upload
        in: body
        name: input
        required: true
        schema:
          items:
            properties:
              filename:
                type: string
              size:
                type: integer
            type: object
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: Presigned URLs generated successfully
          schema:
            allOf:
            - $ref: '#/definitions/utils.Payload'
            - properties:
                data:
                  $ref: '#/definitions/handlers.PresignResponse'
              type: object
        "400":
          description: Invalid input or size limit exceeded
          schema:
            $ref: '#/definitions/utils.Payload'
        "405":
          description: Method not allowed
          schema:
            $ref: '#/definitions/utils.Payload'
        "500":
          description: Failed to generate presigned URL
          schema:
            $ref: '#/definitions/utils.Payload'
      summary: Generate presigned URLs for file upload
      tags:
      - Files
  /api/v1/logout:
    post:
      description: Logs out the current user by clearing the JWT token cookie. Returns
        a success message on successful logout.
      produces:
      - application/json
      responses:
        "200":
          description: Logged out successfully
          schema:
            $ref: '#/definitions/utils.Payload'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/utils.Payload'
      summary: User logout
      tags:
      - Auth
  /api/v1/me:
    get:
      description: Retrieves the current user's session information based on the JWT
        token. Returns user ID, username, and email. Requires authentication.
      produces:
      - application/json
      responses:
        "200":
          description: User session retrieved successfully
          schema:
            $ref: '#/definitions/utils.Payload'
        "401":
          description: Unauthorized - invalid or missing token
          schema:
            $ref: '#/definitions/utils.Payload'
      summary: Get current user session
      tags:
      - Auth
  /api/v1/share/{token}:
    get:
      consumes:
      - application/json
      description: Returns metadata (name, size, contentType, index) of all files
        in a shared transfer.
      parameters:
      - description: Share token
        in: path
        name: token
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Files retrieved successfully
          schema:
            $ref: '#/definitions/utils.Payload'
        "400":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/utils.Payload'
        "404":
          description: Invalid or expired share link
          schema:
            $ref: '#/definitions/utils.Payload'
        "410":
          description: Share link has expired
          schema:
            $ref: '#/definitions/utils.Payload'
      summary: Retrieve shared file details
      tags:
      - Share
  /api/v1/share/{token}/presign-download/{index}:
    get:
      consumes:
      - application/json
      description: Returns a temporary signed URL to download a specific file (by
        index) from a shared transfer.
      parameters:
      - description: Share token
        in: path
        name: token
        required: true
        type: string
      - description: File index
        in: path
        name: index
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Presigned download URL generated successfully
          schema:
            $ref: '#/definitions/utils.Payload'
        "400":
          description: Missing or invalid parameters
          schema:
            $ref: '#/definitions/utils.Payload'
        "404":
          description: File not found or invalid share link
          schema:
            $ref: '#/definitions/utils.Payload'
        "410":
          description: Share link has expired
          schema:
            $ref: '#/definitions/utils.Payload'
      summary: Generate a presigned download URL
      tags:
      - Share
swagger: "2.0"
